<!DOCTYPE html>
<html>
<body>

<h1>Elternbereich</h1>

<div id="children"></div>

<script type="module">
import { supabase } from "./js/supabase.js";

// 🔐 User holen
const { data: { user } } = await supabase.auth.getUser();

if (!user) {
  window.location.href = "login.html";
}

// 👨‍👩‍👧 Kinder holen
const { data, error } = await supabase
  .from("parent_child")
  .select(`
    child_id,
    profiles:child_id (first_name, last_name)
  `)
  .eq("parent_id", user.id);

if (error) {
  console.error(error);
}

document.getElementById("children").innerHTML =
  (data || [])
    .map(c => `<p>👶 ${c.profiles.first_name} ${c.profiles.last_name}</p>`)
    .join("");

</script>

</body>
</html>
