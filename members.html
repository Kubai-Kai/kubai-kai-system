<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mitglieder</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <img src="/assets/logo.png">
    </div>

    <nav class="nav">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/members.html">Mitglieder</a>
      <a href="#">Training</a>
      <a href="#">Prüfungen</a>
      <a href="#">Finanzen</a>
      <a href="/profile.html">Mein Profil</a>
    </nav>
  </aside>

  <div class="main">

    <div class="topbar">
      <div>Mitglieder</div>
      <button class="logout" id="logoutBtn">Logout</button>
    </div>

    <div class="content">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Mitglieder</h2>
        <button class="btn" id="openCreateModal">+ Neues Mitglied</button>
      </div>

      <!-- TABELLE -->
      <table class="member-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="membersTable"></tbody>
      </table>

    </div>

  </div>

</div>

<!-- MODAL DETAIL -->
<div class="modal" id="detailModal">
  <div class="modal-content">

    <h3>Mitglied bearbeiten</h3>

    <input id="editFirstName">
    <input id="editLastName">
    <input id="editEmail">

    <select id="editStatus">
      <option value="active">Aktiv</option>
      <option value="inactive">Inaktiv</option>
      <option value="trial">Probe</option>
    </select>

    <button class="btn" id="saveEdit">Speichern</button>
    <button class="btn" id="closeModal">Schließen</button>

  </div>
</div>

<!-- MODAL CREATE -->
<div class="modal" id="createModal">
  <div class="modal-content">

    <h3>Neues Mitglied</h3>

    <input id="newFirstName" placeholder="Vorname">
    <input id="newLastName" placeholder="Nachname">
    <input id="newEmail" placeholder="Email">

    <button class="btn" id="createMemberBtn">Erstellen</button>
    <button class="btn" id="closeCreateModal">Abbrechen</button>

  </div>
</div>

<script type="module" src="/js/membersPage.js"></script>

</body>
</html>
