<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <img src="/assets/logo.png">
    </div>

    <nav class="nav">
  <a href="/dashboard.html">Dashboard</a>
  <a href="/members.html">Mitglieder</a>
      <a href="#">Training</a>
      <a href="#">Prüfungen</a>
      <a href="#">Finanzen</a>
      <a href="/profile.html">Mein Profil</a>
    </nav>
  </aside>

  <div class="main">

    <div class="topbar">
      <div>Mitglieder</div>
      <button class="logout" id="logoutBtn">Logout</button>
    </div>

    <div class="content">

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Mitglieder</h2>
        <button class="btn" id="openCreateModal">+ Neues Mitglied</button>
      </div>
<input 
  id="searchInput" 
  placeholder="Suche nach Name, Ort, Email..." 
  style="margin-bottom:15px; padding:10px; width:100%; border-radius:8px;"
>
      <!-- TABELLE -->
      <table class="member-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="membersTable"></tbody>
      </table>

    </div>

  </div>

</div>

<div class="modal" id="detailModal">
  <div class="modal-content large">

    <!-- HEADER -->
    <div style="display:flex; justify-content:space-between;">
      <h2 id="profileName">Mitglied</h2>
      <button id="closeModal">X</button>
    </div>

    <!-- VIEW MODE -->
    <div id="viewMode">

      <div class="profile-grid">

        <div>
          <p><b>Email:</b></p>
          <p id="viewEmail"></p>
        </div>

        <div>
          <p><b>Status:</b></p>
          <p id="viewStatus"></p>
        </div>

        <div>
          <p><b>Telefon:</b></p>
          <p id="viewPhone"></p>
        </div>

        <div>
          <p><b>Adresse:</b></p>
          <p id="viewAddress"></p>
        </div>

        <div>
          <p><b>Dabei seit:</b></p>
          <p id="viewCreated"></p>
        </div>

      </div>

      <button class="btn" id="editBtn">Bearbeiten</button>

    </div>

    <!-- EDIT MODE -->
    <div id="editMode" style="display:none;">

      <input id="editFirstName">
      <input id="editLastName">
      <input id="editEmail">
      <input id="editPhone" placeholder="Telefon">

      <input id="editStreet" placeholder="Straße">
      <input id="editCity" placeholder="Stadt">
      <input id="editZip" placeholder="PLZ">

      <select id="editStatus">
        <option value="active">Aktiv</option>
        <option value="inactive">Inaktiv</option>
        <option value="trial">Probe</option>
      </select>

      <button class="btn" id="saveEdit">Speichern</button>
      <button class="btn" id="cancelEdit">Abbrechen</button>

    </div>

  </div>
</div>
  
<!-- MODAL CREATE -->
<div class="modal" id="createModal">
  <div class="modal-content">

    <h3>Neues Mitglied</h3>

    <input id="newFirstName" placeholder="Vorname">
    <input id="newLastName" placeholder="Nachname">
    <input id="newEmail" placeholder="Email">

    <button class="btn" id="createMemberBtn">Erstellen</button>
    <button class="btn" id="closeCreateModal">Abbrechen</button>

  </div>
</div>
<div class="wizard">

  <h2>Neuen User erstellen</h2>

  <input id="email" placeholder="Email">
  <input id="password" placeholder="Passwort">

  <hr>

  <input id="first_name" placeholder="Vorname">
  <input id="last_name" placeholder="Nachname">

  <input id="street" placeholder="Straße">
  <input id="city" placeholder="Stadt">
  <input id="zip" placeholder="PLZ">
  <input id="phone" placeholder="Telefon">

  <select id="role">
    <option value="user">Mitglied</option>
    <option value="trainer">Trainer</option>
    <option value="admin">Admin</option>
  </select>

  <button id="createUserBtn">User erstellen</button>

</div>
  
<script type="module" src="/js/membersPage.js"></script>
  <script src="./adminWizard.js"></script>
  
</body>
</html>
