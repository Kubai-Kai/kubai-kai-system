<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/assets/style.css">
  <title>Mitglieder</title>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <img src="/assets/logo.png">
    </div>

    <nav class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/members.html">Mitglieder</a>
      <a href="#">Training</a>
      <a href="#">Prüfungen</a>
      <a href="#">Finanzen</a>
      <a href="/profile.html">Mein Profil</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div>Mitglieder</div>
      <button class="logout" id="logoutBtn">Logout</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- SEARCH -->
      <input 
        id="searchInput" 
        placeholder="Suche nach Name, Ort, Email..."
        style="margin-bottom:15px; padding:10px; width:100%; border-radius:8px;"
      >

      <!-- TABLE -->
      <table class="member-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="membersTable"></tbody>
      </table>

    </div>
  </div>
</div>

<!-- =========================
     DETAIL MODAL
========================= -->
<div class="modal" id="detailModal">

  <div class="modal-content large">

    <div style="display:flex; justify-content:space-between;">
      <h2 id="profileName">Mitglied</h2>
      <button id="closeModal">X</button>
    </div>

    <!-- VIEW -->
    <div id="viewMode">

      <div class="profile-grid">

        <div>
          <p><b>Email:</b></p>
          <p id="viewEmail"></p>
        </div>

        <div>
          <p><b>Status:</b></p>
          <p id="viewStatus"></p>
        </div>

        <div>
          <p><b>Telefon:</b></p>
          <p id="viewPhone"></p>
        </div>

        <div>
          <p><b>Adresse:</b></p>
          <p id="viewAddress"></p>
        </div>

        <div>
          <p><b>Dabei seit:</b></p>
          <p id="viewCreated"></p>
        </div>

      </div>

      <button class="btn" id="editBtn">Bearbeiten</button>

    </div>

    <!-- EDIT -->
    <div id="editMode" style="display:none;">

      <input id="editFirstName">
      <input id="editLastName">
      <input id="editEmail">
      <input id="editPhone">

      <input id="editStreet">
      <input id="editCity">
      <input id="editZip">

      <select id="editStatus">
        <option value="active">Aktiv</option>
        <option value="inactive">Inaktiv</option>
        <option value="trial">Probe</option>
      </select>

      <button class="btn" id="saveEdit">Speichern</button>
      <button class="btn" id="cancelEdit">Abbrechen</button>

    </div>

  </div>
</div>

<!-- =========================
     ADMIN WIZARD PANEL
========================= -->
<div id="adminWizardPanel" class="wizard-panel">

  <div class="wizard-header">
    <h2>Neuen User erstellen</h2>
    <button id="closeWizardBtn">✕</button>
  </div>

  <div class="wizard-body">

    <input id="wizEmail" placeholder="Email">
    <input id="wizPassword" placeholder="Passwort">

    <hr>

    <input id="wizFirstName" placeholder="Vorname">
    <input id="wizLastName" placeholder="Nachname">

    <input id="wizStreet" placeholder="Straße">
    <input id="wizCity" placeholder="Stadt">
    <input id="wizZip" placeholder="PLZ">
    <input id="wizPhone" placeholder="Telefon">

    <select id="wizRole">
      <option value="user">Mitglied</option>
      <option value="trainer">Trainer</option>
      <option value="admin">Admin</option>
    </select>

    <button class="btn" id="createWizardUserBtn">Erstellen</button>

  </div>

</div>
<!-- JS -->
<script type="module" src="/js/membersPage.js"></script>

</body>
</html>
