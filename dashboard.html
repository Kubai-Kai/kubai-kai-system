<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<h1>Dashboard</h1>

<a id="adminLink" href="admin.html" style="display:none;">🔧 Admin-Bereich</a>
<button id="logoutBtn">Logout</button>
  
<h2>Mitglieder</h2>
<div id="membersList">Lade...</div>

  <h2>Neues Mitglied</h2>

<div id="memberForm" style="display:none;">
  <input id="firstName" placeholder="Vorname">
  <input id="lastName" placeholder="Nachname">
  <input id="emailMember" placeholder="Email">
  <button id="saveMember">Speichern</button>
</div>
  
<script type="module">
  import { supabase } from './js/supabase.js';
  import { getUserRole } from './js/app.js';

  // Session prüfen
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    window.location.href = '/login.html';
  }

  // Admin-Link anzeigen wenn Admin
  const role = await getUserRole();
  if (role === 'admin') {
    document.getElementById("adminLink").style.display = "block";
  }

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  });

  import { getMembers } from "./js/members.js";

const members = await getMembers();

const container = document.getElementById("membersList");
container.innerHTML = "";

members.forEach(m => {
  const div = document.createElement("div");
  div.textContent = `${m.first_name} ${m.last_name}`;
  container.appendChild(div);
});
  import { createMember } from "./js/members.js";

// Formular nur für Admin/Trainer anzeigen
if (role === 'admin' || role === 'trainer') {
  document.getElementById("memberForm").style.display = "block";
}
  document.getElementById("saveMember").addEventListener("click", async () => {
  const member = {
    first_name: document.getElementById("firstName").value,
    last_name: document.getElementById("lastName").value,
    email: document.getElementById("emailMember").value
  };

  const ok = await createMember(member);

  if (ok) {
    alert("Gespeichert!");
    location.reload(); // wichtig fürs UI
  } else {
    alert("Fehler beim Speichern");
  }
});
  
</script>

</body>
</html>
