<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Kubai-Kai System</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

<div class="logo">
  <img src="assets/logo.png" alt="Logo">
</div>

    <nav class="nav">
      <a href="#">Dashboard</a>
      <a href="#members">Mitglieder</a>
      <a href="#training">Training</a>
      <a href="#exams">Prüfungen</a>
      <a href="#finance">Finanzen</a>
      <a href="/profile.html">Mein Profil</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div>Dashboard</div>
      <button class="logout" id="logoutBtn">Logout</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- ================= DASHBOARD CARDS ================= -->
      <h2>Übersicht</h2>

      <div class="grid">

        <div class="card">
          <h3>Mitglieder</h3>
          <p id="memberCount">-</p>
        </div>

        <div class="card">
          <h3>Trainings</h3>
          <p id="trainingCount">-</p>
        </div>

        <div class="card">
          <h3>Prüfungen</h3>
          <p id="examCount">-</p>
        </div>

        <div class="card">
          <h3>Kasse</h3>
          <p id="financeSum">-</p>
        </div>

      </div>

      <hr style="margin:20px 0; border-color:#1f2a44;">

      </section>

      <!-- ================= TRAINING (PLATZHALTER) ================= -->
      <section id="training">
        <h2>Training</h2>
        <div class="card">Hier kommt später Training</div>
      </section>

      <!-- ================= PRÜFUNGEN ================= -->
      <section id="exams">
        <h2>Prüfungen</h2>
        <div class="card">Hier kommt später Prüfungslogik</div>
      </section>

      <!-- ================= FINANZEN ================= -->
      <section id="finance">
        <h2>Finanzen</h2>
        <div class="card">Hier kommt später Kassenbuch</div>
      </section>

    </div>

  </div>

</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
