<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<h1>Dashboard</h1>

<a id="adminLink" href="admin.html" style="display:none;">🔧 Admin-Bereich</a>
<button id="logoutBtn">Logout</button>
  
<h2>Mitglieder</h2>
<div id="membersList">Lade...</div>
  
<script type="module">
  import { supabase } from './js/supabase.js';
  import { getUserRole } from './js/app.js';

  // Session prüfen
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    window.location.href = '/login.html';
  }

  // Admin-Link anzeigen wenn Admin
  const role = await getUserRole();
  if (role === 'admin') {
    document.getElementById("adminLink").style.display = "block";
  }

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = '/login.html';
  });

  import { getMembers } from "./js/members.js";

const members = await getMembers();

const container = document.getElementById("membersList");
container.innerHTML = "";

members.forEach(m => {
  const div = document.createElement("div");
  div.textContent = `${m.first_name} ${m.last_name}`;
  container.appendChild(div);
});
  
</script>
  

</body>
</html>
