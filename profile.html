<!DOCTYPE html>
<html lang="de">
<head>

  <title>Mein Profil - Kubai-Kai System</title>

</head>

<body>

  <header>
    <h1>Mein Profil</h1>

  <main>

  <script type="module" src="/js/profile.js"></script>

</body>
</html>
